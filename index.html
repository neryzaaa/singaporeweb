<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Web GIS Interaktif — Persebaran Sekolah dan Taman Kanak-Kanak di Singapura" />
  <title>Persebaran Sekolah &amp; TK di Singapore</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset & Base ─────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ───────────────────────────────────── */
    .header {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      border-bottom: 1px solid rgba(99, 102, 241, 0.25);
      padding: 14px 28px;
      display: flex;
      align-items: center;
      gap: 14px;
      position: relative;
      z-index: 1000;
    }

    .header::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, #6366f1, #a78bfa, #6366f1, transparent);
    }

    .header-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #6366f1, #a78bfa);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      box-shadow: 0 4px 15px rgba(99, 102, 241, 0.35);
    }

    .header-text h1 {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, #e2e8f0, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.3px;
    }

    .header-text p {
      font-size: 11px;
      color: #94a3b8;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-top: 1px;
    }

    .header-stats {
      margin-left: auto;
      display: flex;
      gap: 18px;
    }

    .stat-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(30, 41, 59, 0.8);
      border: 1px solid rgba(99, 102, 241, 0.15);
      border-radius: 10px;
      padding: 8px 14px;
      backdrop-filter: blur(8px);
    }

    .stat-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      animation: pulse-dot 2s ease-in-out infinite;
    }

    .stat-dot.blue {
      background: #3b82f6;
      box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
    }

    .stat-dot.yellow {
      background: #facc15;
      box-shadow: 0 0 10px rgba(250, 204, 21, 0.5);
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.85); }
    }

    .stat-label {
      font-size: 12px;
      color: #94a3b8;
      font-weight: 500;
    }

    .stat-count {
      font-size: 14px;
      font-weight: 700;
      color: #e2e8f0;
    }

    /* ── Main Content (Sidebar + Map) ─────────────── */
    .main-content {
      flex: 1;
      display: flex;
      position: relative;
      overflow: hidden;
    }

    /* ── Sidebar ──────────────────────────────────── */
    .sidebar {
      width: 360px;
      background: rgba(15, 23, 42, 0.98);
      border-right: 1px solid rgba(99, 102, 241, 0.15);
      display: flex;
      flex-direction: column;
      z-index: 500;
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1), width 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }

    .sidebar.collapsed {
      transform: translateX(-360px);
      width: 0;
      min-width: 0;
      border-right: none;
    }

    .sidebar-toggle {
      position: absolute;
      top: 14px;
      right: -44px;
      width: 38px;
      height: 38px;
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid rgba(99, 102, 241, 0.25);
      border-radius: 0 10px 10px 0;
      color: #e2e8f0;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 600;
      transition: all 0.2s ease;
      backdrop-filter: blur(12px);
    }

    .sidebar-toggle:hover {
      background: rgba(30, 41, 59, 0.95);
      border-color: rgba(99, 102, 241, 0.5);
      box-shadow: 0 4px 15px rgba(99, 102, 241, 0.2);
    }

    .sidebar.collapsed .sidebar-toggle {
      right: -44px;
    }

    /* Sidebar Header */
    .sidebar-header {
      padding: 18px 20px 14px;
      border-bottom: 1px solid rgba(99, 102, 241, 0.1);
    }

    .sidebar-title {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #94a3b8;
      margin-bottom: 14px;
    }

    /* Search Box */
    .search-box {
      position: relative;
    }

    .search-box input {
      width: 100%;
      padding: 10px 14px 10px 38px;
      background: rgba(30, 41, 59, 0.6);
      border: 1px solid rgba(99, 102, 241, 0.15);
      border-radius: 10px;
      color: #e2e8f0;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      outline: none;
      transition: all 0.2s ease;
    }

    .search-box input::placeholder {
      color: #64748b;
    }

    .search-box input:focus {
      border-color: rgba(99, 102, 241, 0.5);
      background: rgba(30, 41, 59, 0.8);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
    }

    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      color: #64748b;
      pointer-events: none;
    }

    /* Filter Tabs */
    .filter-tabs {
      display: flex;
      gap: 6px;
      padding: 12px 20px;
      border-bottom: 1px solid rgba(99, 102, 241, 0.1);
    }

    .filter-tab {
      flex: 1;
      padding: 8px 10px;
      border: 1px solid rgba(99, 102, 241, 0.12);
      border-radius: 8px;
      background: transparent;
      color: #94a3b8;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: center;
    }

    .filter-tab:hover {
      background: rgba(99, 102, 241, 0.08);
      color: #cbd5e1;
    }

    .filter-tab.active {
      background: rgba(99, 102, 241, 0.15);
      border-color: rgba(99, 102, 241, 0.35);
      color: #a5b4fc;
    }

    .filter-tab .tab-count {
      display: inline-block;
      background: rgba(99, 102, 241, 0.2);
      padding: 1px 7px;
      border-radius: 10px;
      font-size: 10px;
      margin-left: 4px;
      font-weight: 700;
    }

    /* Sidebar List */
    .sidebar-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 12px;
    }

    .sidebar-list::-webkit-scrollbar {
      width: 5px;
    }

    .sidebar-list::-webkit-scrollbar-track {
      background: transparent;
    }

    .sidebar-list::-webkit-scrollbar-thumb {
      background: rgba(99, 102, 241, 0.2);
      border-radius: 10px;
    }

    .sidebar-list::-webkit-scrollbar-thumb:hover {
      background: rgba(99, 102, 241, 0.4);
    }

    /* List Item */
    .list-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px solid transparent;
      margin-bottom: 4px;
    }

    .list-item:hover {
      background: rgba(99, 102, 241, 0.06);
      border-color: rgba(99, 102, 241, 0.12);
    }

    .list-item.active {
      background: rgba(99, 102, 241, 0.1);
      border-color: rgba(99, 102, 241, 0.25);
    }

    .list-item-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-top: 4px;
      flex-shrink: 0;
    }

    .list-item-dot.school {
      background: #3b82f6;
      box-shadow: 0 0 8px rgba(59, 130, 246, 0.4);
    }

    .list-item-dot.kindergarten {
      background: #facc15;
      box-shadow: 0 0 8px rgba(250, 204, 21, 0.4);
    }

    .list-item-info {
      flex: 1;
      min-width: 0;
    }

    .list-item-name {
      font-size: 13px;
      font-weight: 600;
      color: #e2e8f0;
      line-height: 1.3;
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .list-item-meta {
      font-size: 11px;
      color: #64748b;
      font-weight: 500;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .list-item-meta span {
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .list-item-badge {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 2px 8px;
      border-radius: 6px;
      margin-top: 5px;
      display: inline-block;
    }

    .list-item-badge.school {
      background: rgba(59, 130, 246, 0.12);
      color: #60a5fa;
      border: 1px solid rgba(59, 130, 246, 0.2);
    }

    .list-item-badge.kindergarten {
      background: rgba(250, 204, 21, 0.12);
      color: #fde047;
      border: 1px solid rgba(250, 204, 21, 0.2);
    }

    .list-item-arrow {
      color: #475569;
      font-size: 12px;
      margin-top: 4px;
      transition: transform 0.2s;
    }

    .list-item:hover .list-item-arrow {
      transform: translateX(3px);
      color: #6366f1;
    }

    /* No Results */
    .no-results {
      text-align: center;
      padding: 40px 20px;
      color: #64748b;
    }

    .no-results-icon {
      font-size: 32px;
      margin-bottom: 10px;
      opacity: 0.5;
    }

    .no-results-text {
      font-size: 13px;
      font-weight: 500;
    }

    /* Sidebar Footer */
    .sidebar-footer {
      padding: 12px 20px;
      border-top: 1px solid rgba(99, 102, 241, 0.1);
      font-size: 11px;
      color: #475569;
      text-align: center;
      font-weight: 500;
    }

    /* ── Map Container ────────────────────────────── */
    #map {
      flex: 1;
      z-index: 1;
    }

    /* ── Custom Popups ────────────────────────────── */
    .leaflet-popup-content-wrapper {
      background: rgba(15, 23, 42, 0.95) !important;
      backdrop-filter: blur(16px) !important;
      border: 1px solid rgba(99, 102, 241, 0.25) !important;
      border-radius: 14px !important;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 30px rgba(99, 102, 241, 0.1) !important;
      color: #e2e8f0 !important;
      padding: 0 !important;
      overflow: hidden;
    }

    .leaflet-popup-content {
      margin: 0 !important;
      min-width: 280px;
    }

    .leaflet-popup-tip {
      background: rgba(15, 23, 42, 0.95) !important;
      border: 1px solid rgba(99, 102, 241, 0.25) !important;
      box-shadow: none !important;
    }

    .leaflet-popup-close-button {
      color: #94a3b8 !important;
      font-size: 20px !important;
      padding: 6px 10px 0 0 !important;
      transition: color 0.2s !important;
    }

    .leaflet-popup-close-button:hover {
      color: #e2e8f0 !important;
    }

    .popup-card {
      padding: 0;
    }

    .popup-header {
      padding: 16px 20px;
      border-bottom: 1px solid rgba(99, 102, 241, 0.15);
      position: relative;
      overflow: hidden;
    }

    .popup-header::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
    }

    .popup-header.school {
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.15), rgba(59, 130, 246, 0.03));
    }

    .popup-header.school::before {
      background: linear-gradient(90deg, #3b82f6, #60a5fa, #3b82f6);
    }

    .popup-header.kindergarten {
      background: linear-gradient(135deg, rgba(250, 204, 21, 0.15), rgba(250, 204, 21, 0.03));
    }

    .popup-header.kindergarten::before {
      background: linear-gradient(90deg, #facc15, #fde047, #facc15);
    }

    .popup-tag {
      display: inline-block;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 8px;
    }

    .popup-tag.school {
      background: rgba(59, 130, 246, 0.2);
      color: #60a5fa;
      border: 1px solid rgba(59, 130, 246, 0.3);
    }

    .popup-tag.kindergarten {
      background: rgba(250, 204, 21, 0.2);
      color: #fde047;
      border: 1px solid rgba(250, 204, 21, 0.3);
    }

    .popup-title {
      font-size: 15px;
      font-weight: 700;
      color: #f1f5f9;
      line-height: 1.35;
    }

    .popup-body {
      padding: 14px 20px 18px;
    }

    .popup-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 6px 0;
      border-bottom: 1px solid rgba(148, 163, 184, 0.07);
      gap: 14px;
    }

    .popup-row:last-child {
      border-bottom: none;
    }

    .popup-key {
      font-size: 11px;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .popup-value {
      font-size: 12px;
      font-weight: 500;
      color: #cbd5e1;
      text-align: right;
      word-break: break-word;
    }

    .popup-value a {
      color: #818cf8;
      text-decoration: none;
      transition: color 0.2s;
    }

    .popup-value a:hover {
      color: #a5b4fc;
      text-decoration: underline;
    }

    .popup-value .accredited-yes {
      color: #4ade80;
      font-weight: 600;
    }

    .popup-value .accredited-no {
      color: #f87171;
      font-weight: 600;
    }

    /* ── Popup Image ──────────────────────────────── */
    .popup-image-container {
      width: 100%;
      height: 150px;
      background: rgba(15, 23, 42, 0.8);
      border-bottom: 1px solid rgba(99, 102, 241, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .popup-img-skeleton {
      font-size: 11px;
      color: #64748b;
      font-weight: 500;
      animation: pulse-img 1.5s infinite;
    }

    @keyframes pulse-img {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    .popup-img-loaded {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 0.3s ease;
    }

    .popup-no-img {
      font-size: 11px;
      color: #64748b;
      font-style: italic;
    }

    /* ── Legend ────────────────────────────────────── */
    .legend-control {
      background: rgba(15, 23, 42, 0.92) !important;
      backdrop-filter: blur(16px);
      border: 1px solid rgba(99, 102, 241, 0.2) !important;
      border-radius: 14px !important;
      padding: 16px 20px !important;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4), 0 0 20px rgba(99, 102, 241, 0.08) !important;
      color: #e2e8f0;
      min-width: 180px;
    }

    .legend-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #94a3b8;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(99, 102, 241, 0.15);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 0;
    }

    .legend-marker {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      flex-shrink: 0;
    }

    .legend-marker.blue {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      box-shadow: 0 2px 8px rgba(59, 130, 246, 0.4);
    }

    .legend-marker.yellow {
      background: linear-gradient(135deg, #facc15, #eab308);
      box-shadow: 0 2px 8px rgba(250, 204, 21, 0.4);
    }

    .legend-label {
      font-size: 13px;
      font-weight: 500;
      color: #cbd5e1;
    }

    /* ── Layer Control Override ────────────────────── */
    .leaflet-control-layers {
      background: rgba(15, 23, 42, 0.92) !important;
      backdrop-filter: blur(16px) !important;
      border: 1px solid rgba(99, 102, 241, 0.2) !important;
      border-radius: 12px !important;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4) !important;
      color: #e2e8f0 !important;
      padding: 0 !important;
    }

    .leaflet-control-layers-toggle {
      width: 40px !important;
      height: 40px !important;
      background-size: 22px 22px !important;
      border-radius: 10px !important;
      background-color: rgba(15, 23, 42, 0.92) !important;
      border: 1px solid rgba(99, 102, 241, 0.2) !important;
      backdrop-filter: blur(8px) !important;
      transition: all 0.2s ease !important;
    }

    .leaflet-control-layers-toggle:hover {
      border-color: rgba(99, 102, 241, 0.5) !important;
      box-shadow: 0 4px 15px rgba(99, 102, 241, 0.2) !important;
    }

    .leaflet-control-layers-expanded {
      padding: 14px 18px 14px 10px !important;
    }

    .leaflet-control-layers-overlays label {
      display: flex !important;
      align-items: center !important;
      gap: 8px !important;
      padding: 4px 6px !important;
      border-radius: 6px !important;
      cursor: pointer !important;
      transition: background 0.15s !important;
      font-size: 13px !important;
      font-weight: 500 !important;
    }

    .leaflet-control-layers-overlays label:hover {
      background: rgba(99, 102, 241, 0.1) !important;
    }

    .leaflet-control-layers-selector {
      accent-color: #6366f1;
      width: 16px;
      height: 16px;
    }

    /* ── Zoom Control ─────────────────────────────── */
    .leaflet-control-zoom a {
      background: rgba(15, 23, 42, 0.92) !important;
      color: #e2e8f0 !important;
      border: 1px solid rgba(99, 102, 241, 0.2) !important;
      backdrop-filter: blur(8px) !important;
      width: 36px !important;
      height: 36px !important;
      line-height: 36px !important;
      font-size: 16px !important;
      transition: all 0.2s ease !important;
    }

    .leaflet-control-zoom a:hover {
      background: rgba(30, 41, 59, 0.95) !important;
      border-color: rgba(99, 102, 241, 0.5) !important;
    }

    .leaflet-control-zoom-in {
      border-radius: 10px 10px 0 0 !important;
    }

    .leaflet-control-zoom-out {
      border-radius: 0 0 10px 10px !important;
    }

    /* ── Attribution ──────────────────────────────── */
    .leaflet-control-attribution {
      background: rgba(15, 23, 42, 0.8) !important;
      color: #64748b !important;
      font-size: 10px !important;
      backdrop-filter: blur(8px) !important;
      border-radius: 8px 0 0 0 !important;
    }

    .leaflet-control-attribution a {
      color: #818cf8 !important;
    }

    /* ── Loading Overlay ──────────────────────────── */
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: #0f172a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }

    .loading-overlay.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .loader-ring {
      width: 52px;
      height: 52px;
      border: 3px solid rgba(99, 102, 241, 0.15);
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loader-text {
      margin-top: 18px;
      font-size: 13px;
      font-weight: 500;
      color: #94a3b8;
      letter-spacing: 0.5px;
    }

    /* ── Dark Map Tiles ───────────────────────────── */
    .leaflet-tile-pane {
      filter: saturate(0.85) brightness(0.92);
    }

    /* ── Responsive ───────────────────────────────── */
    @media (max-width: 768px) {
      .header { padding: 10px 16px; gap: 10px; }
      .header-icon { width: 34px; height: 34px; font-size: 17px; border-radius: 8px; }
      .header-text h1 { font-size: 15px; }
      .header-text p { font-size: 10px; }
      .header-stats { display: none; }
      .legend-control { min-width: 140px; padding: 12px 14px !important; }
      .sidebar { width: 300px; }
      .sidebar.collapsed { transform: translateX(-300px); }
    }

    @media (max-width: 480px) {
      .sidebar { width: 100%; position: absolute; top: 0; bottom: 0; left: 0; }
      .sidebar.collapsed { transform: translateX(-100%); }
    }
  </style>
</head>
<body>

  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loader-ring"></div>

    // ── Wikipedia Image Fetcher & Fallback ─────────
    var wikiCache = {}; // Cache to avoid duplicate requests
    function fetchWikipediaImage(query, containerId) {
      // Clean query (remove @ and location parts for better match)
      var cleanQuery = query.split('@')[0].trim();
      
      if (wikiCache[cleanQuery] !== undefined) {
        renderWikiImage(wikiCache[cleanQuery], cleanQuery, containerId);
        return;
      }

      var url = 'https://en.wikipedia.org/w/api.php?action=query&generator=search&gsrsearch=' + encodeURIComponent(cleanQuery + ' Singapore') + '&gsrlimit=1&prop=pageimages&piprop=thumbnail&pithumbsize=400&format=json&origin=*';
      
      fetch(url).then(function(r) { return r.json(); }).then(function(data) {
        var pages = data.query && data.query.pages;
        var imgSrc = null;
        if (pages) {
          var pageId = Object.keys(pages)[0];
          var thumb = pages[pageId].thumbnail;
          if (thumb && thumb.source) {
            imgSrc = thumb.source;
          }
        }
        wikiCache[cleanQuery] = imgSrc;
        renderWikiImage(imgSrc, cleanQuery, containerId);
      }).catch(function(err) {
        console.error('Wiki Error:', err);
        wikiCache[cleanQuery] = null;
        renderWikiImage(null, cleanQuery, containerId);
      });
    }

    function renderWikiImage(imgSrc, queryName, containerId) {
      var container = document.getElementById(containerId);
      if (!container) return; // popup might be closed already
      
      if (imgSrc) {
        container.innerHTML = '<img src="' + imgSrc + '" alt="' + queryName + '" class="popup-img-loaded" />';
      } else {
        container.innerHTML = '<div class="popup-no-img">Tidak ada foto di Wikipedia</div>';
      }
    }

      // Sekolah — marker biru
      L.geoJSON(schoolsData, {
        pointToLayer: function (feature, latlng) {
          return createCircleMarker(latlng, '#3b82f6', '#1d4ed8');
        },
        onEachFeature: function (feature, layer) {
          popupCounter++;
          var imgId = 'popup-img-' + popupCounter;
          var popup = buildSchoolPopup(feature.properties, imgId);
          layer.bindPopup(popup, { maxWidth: 330, minWidth: 280, closeButton: true });
          
          layer.on('popupopen', function () {
            fetchWikipediaImage(feature.properties.name, imgId);
          });
          
          layer.on('click', function (e) {
            map.flyTo(e.latlng, 16, { duration: 0.8 });
          });
          
          layer.on('mouseover', function () { this.setStyle({ radius: 11, fillOpacity: 1 }); });
          layer.on('mouseout', function () { this.setStyle({ radius: 8, fillOpacity: 0.85 }); });

          var coords = feature.geometry.coordinates;
          var idx = allItems.length;
          allItems.push({
            type: 'school',
            props: feature.properties,
            latlng: [coords[1], coords[0]],
            layer: layer,
            globalIndex: idx
          });
        }
      }).addTo(schoolLayer);

          return createCircleMarker(latlng, '#facc15', '#ca8a04');
        },
        onEachFeature: function (feature, layer) {
          popupCounter++;
          var imgId = 'popup-img-' + popupCounter;
          var popup = buildKindergartenPopup(feature.properties, imgId);
          layer.bindPopup(popup, { maxWidth: 330, minWidth: 280, closeButton: true });
          
          layer.on('popupopen', function () {
            fetchWikipediaImage(feature.properties.name, imgId);
          });
          
          layer.on('click', function (e) {
            map.flyTo(e.latlng, 16, { duration: 0.8 });
          });
          
          layer.on('mouseover', function () { this.setStyle({ radius: 11, fillOpacity: 1 }); });
          layer.on('mouseout', function () { this.setStyle({ radius: 8, fillOpacity: 0.85 }); });

          var coords = feature.geometry.coordinates;
          var idx = allItems.length;
          allItems.push({
            type: 'kindergarten',
            props: feature.properties,
            latlng: [coords[1], coords[0]],
            layer: layer,
            globalIndex: idx
          });
        }
      }).addTo(kindergartenLayer);

      // Tambah ke peta
      schoolLayer.addTo(map);
      kindergartenLayer.addTo(map);

      // Update semua counter
      var schoolCount = schoolsData.features.length;
      var tkCount = kindergartensData.features.length;

      document.getElementById('schoolCount').textContent = schoolCount;
      document.getElementById('tkCount').textContent = tkCount;
      document.getElementById('countAll').textContent = schoolCount + tkCount;
      document.getElementById('countSchool').textContent = schoolCount;
      document.getElementById('countTK').textContent = tkCount;

      // Layer Control (Basemaps & Overlays)
      var basemaps = {
        '🌙  Dark Map': dark,
        '🗺️  OSM Standard': osm,
        '🛰️  Satellite': satellite
      };
      
      var overlays = {
        '🔵  Sekolah': schoolLayer,
        '🟡  Taman Kanak-Kanak': kindergartenLayer
      };
      L.control.layers(basemaps, overlays, { collapsed: true, position: 'topright' }).addTo(map);

      // Render sidebar
      renderSidebarList();

      // Hilangkan loading
      document.getElementById('loadingOverlay').classList.add('hidden');



    // ── Legend Control ─────────────────────────────
    var legend = L.control({ position: 'bottomright' });

    legend.onAdd = function () {
      var div = L.DomUtil.create('div', 'legend-control');
      div.innerHTML =
        '<div class="legend-title">Legenda</div>' +
        '<div class="legend-item">' +
          '<span class="legend-marker blue"></span>' +
          '<span class="legend-label">Sekolah</span>' +
        '</div>' +
        '<div class="legend-item">' +
          '<span class="legend-marker yellow"></span>' +
          '<span class="legend-label">Taman Kanak-Kanak</span>' +
        '</div>';
      return div;
    };

    legend.addTo(map);
  </script>

</body>
</html>
